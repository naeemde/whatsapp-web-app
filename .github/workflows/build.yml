name: Build Debug APK

# يشتغل تلقائيًا عند أي رفع (push) على main، وأيضًا يمكن تشغيله يدويًا
# من تبويب Actions بالضغط على زر "Run workflow"
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      # يضمن وجود نسخة أندرويد SDK المطلوبة على السيرفر
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      # نستخدم Gradle مباشرة (بدون الاعتماد على gradlew) لتفادي أي مشاكل
      # بملف الـ wrapper
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: 8.9

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      # الملف الناتج يظهر بعد انتهاء التشغيل في نفس صفحة الـ Actions
      # تحت قسم Artifacts، كملف مضغوط يحتوي app-debug.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-web-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
